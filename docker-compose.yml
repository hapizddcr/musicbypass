version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audioforge-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_DISCORD_ID=${AUTH_DISCORD_ID}
      - AUTH_DISCORD_SECRET=${AUTH_DISCORD_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION}
      - MIDTRANS_NOTIFICATION_URL=${MIDTRANS_NOTIFICATION_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - audioforge-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audioforge-worker
    restart: unless-stopped
    command: ['node', 'workers/audio-worker.js']
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    depends_on:
      - app
    networks:
      - audioforge-net

  postgres:
    image: postgres:16-alpine
    container_name: audioforge-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=audioforge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-audioforge}
      - POSTGRES_DB=audioforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U audioforge']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audioforge-net

  nginx:
    image: nginx:alpine
    container_name: audioforge-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - audioforge-net

volumes:
  postgres-data:

networks:
  audioforge-net:
    driver: bridge
