name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Generate Prisma client
        run: npx prisma generate
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: audioforge
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: audioforge_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://audioforge:test123@localhost:5432/audioforge_test
      AUTH_SECRET: ci-test-secret-key-only-for-build
      AUTH_DISCORD_ID: ci-discord
      AUTH_DISCORD_SECRET: ci-discord
      AUTH_GOOGLE_ID: ci-google
      AUTH_GOOGLE_SECRET: ci-google
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci || npm install
      - run: npx prisma migrate deploy
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      AUTH_SECRET: ci-build-secret-key-only-for-build
      DATABASE_URL: postgresql://test:test123@localhost:5432/test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci || npm install
      - run: npx prisma generate
      - run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: .next
          path: .next/
          retention-days: 7
